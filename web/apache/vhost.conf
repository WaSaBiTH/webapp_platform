<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # Security: Disable Directory Indexing and limit FollowSymLinks
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Security: Block access to hidden files (e.g. .env, .git)
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # Dimension 4: Reverse Proxy for phpMyAdmin Obfuscation
    # Route requests from the specific path down to the internal phpmyadmin container
    ProxyPass /db-manage-app http://phpmyadmin/
    ProxyPassReverse /db-manage-app http://phpmyadmin/

    # Security: Block access to .htaccess files specifically
    <FilesMatch "^\.htaccess">
        Require all denied
    </FilesMatch>

    # Security: Block access to .conf files
    <FilesMatch "\.conf$">
        Require all denied
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
