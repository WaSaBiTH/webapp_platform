# Security: Mask Apache version signature
ServerTokens Prod
ServerSignature Off

# Optimization: KeepAlive settings
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 5

# Optimization: MPM Prefork Tuning
# (Since php:8.2-apache uses module PHP, Prefork is used)
<IfModule mpm_prefork_module>
    StartServers             5
    MinSpareServers          5
    MaxSpareServers         10
    MaxRequestWorkers      150
    MaxConnectionsPerChild   0
</IfModule>
